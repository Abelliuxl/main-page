<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - Abelliuxl Macintosh</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        :root {
            --color-black: #000000;
            --color-white: #ffffff;
            --color-gray-10: #f8f8f8;
            --color-gray-15: #eeeeee;
            --color-gray-25: #d9d9d9;
            --color-gray-35: #c8c8c8;
            --color-gray-50: #929292;
            --color-gray-75: #4f4f4f;
            --color-aqua-blue: #2f83f7;
            --color-aqua-blue-dark: #0751c9;
            --color-aqua-blue-light: #b9ddff;
            --color-aqua-window: #f7f7f7;
            --color-aqua-desktop: #8aa9d6;
            --color-link: #003fbd;
            --font-family-system: "Lucida Grande", "Geneva", "Helvetica", Arial, sans-serif;
            --font-family-mono: "Monaco", "Courier New", monospace;
            --font-size-xs: 9px;
            --font-size-sm: 10px;
            --font-size-md: 12px;
            --font-size-lg: 14px;
            --font-size-xl: 18px;
            --font-size-2xl: 24px;
            --line-height-normal: 1.5;
            --line-height-relaxed: 1.8;
            --spacing-1: 4px;
            --spacing-2: 8px;
            --spacing-3: 12px;
            --spacing-4: 16px;
            --spacing-5: 20px;
            --spacing-6: 24px;
            --spacing-8: 32px;
            --menubar-height: 24px;
            --border-width-thick: 3px;
            --border-width-thin: 2px;
            --border-width-hairline: 1px;
            --shadow-hard-lg: 0 14px 28px rgba(0, 0, 0, 0.32);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100%;
            font-family: var(--font-family-system);
            font-size: var(--font-size-md);
            line-height: var(--line-height-normal);
            background: var(--color-aqua-desktop);
            color: var(--color-black);
        }

        body {
            background-image:
                linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0) 34%),
                repeating-linear-gradient(
                    0deg,
                    rgba(255,255,255,0.24),
                    rgba(255,255,255,0.24) 1px,
                    rgba(94, 122, 166, 0.18) 1px,
                    rgba(94, 122, 166, 0.18) 3px
                );
            padding-top: var(--menubar-height);
        }

        .menu-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--menubar-height);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(218, 225, 238, 0.94));
            border-bottom: var(--border-width-hairline) solid rgba(42, 65, 98, 0.72);
            display: flex;
            align-items: center;
            padding: 0 var(--spacing-3);
            z-index: 1000;
            box-shadow:
                inset 0 1px 0 var(--color-white),
                0 1px 3px rgba(0, 0, 0, 0.28);
        }

        .menu-bar .logo {
            font-weight: bold;
            font-size: var(--font-size-sm);
            padding-right: var(--spacing-4);
            color: #1d2b45;
            text-shadow: 0 1px 0 var(--color-white);
        }

        .menu-bar .menu-items {
            display: flex;
            gap: var(--spacing-4);
            margin-left: var(--spacing-4);
        }

        .menu-bar .menu-item,
        .menu-bar .clock {
            font-size: var(--font-size-sm);
        }

        .menu-bar .menu-item {
            padding: 2px var(--spacing-2);
            border-radius: 10px;
            color: #182235;
        }

        .menu-bar .menu-item:hover {
            background: linear-gradient(180deg, var(--color-aqua-blue-light), var(--color-aqua-blue), var(--color-aqua-blue-dark));
            color: var(--color-white);
            text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.35);
        }

        .menu-bar .clock {
            margin-left: auto;
            font-family: var(--font-family-mono);
        }

        main {
            width: min(880px, calc(100vw - 32px));
            margin: var(--spacing-8) auto;
        }

        .window {
            position: relative;
            background: var(--color-aqua-window);
            border: var(--border-width-hairline) solid rgba(43, 66, 102, 0.88);
            box-shadow: var(--shadow-hard-lg);
            padding: 0;
            border-radius: 8px 8px 5px 5px;
            overflow: hidden;
        }

        .window::before {
            content: '';
            position: absolute;
            inset: 1px;
            pointer-events: none;
            border-radius: 7px 7px 4px 4px;
            border-top: var(--border-width-hairline) solid rgba(255, 255, 255, 0.92);
            border-left: var(--border-width-hairline) solid rgba(255, 255, 255, 0.72);
            border-right: var(--border-width-hairline) solid rgba(0, 0, 0, 0.18);
            border-bottom: var(--border-width-hairline) solid rgba(0, 0, 0, 0.26);
        }

        .window-titlebar {
            height: 24px;
            background:
                linear-gradient(180deg, #bfe1ff 0%, #59a6ff 42%, #146fdd 48%, #0751c9 100%),
                repeating-linear-gradient(
                    0deg,
                    rgba(255,255,255,0.26),
                    rgba(255,255,255,0.26) 1px,
                    rgba(0,0,0,0.06) 1px,
                    rgba(0,0,0,0.06) 3px
                );
            background-blend-mode: normal, multiply;
            color: var(--color-white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--font-size-sm);
            font-weight: bold;
            border-bottom: var(--border-width-hairline) solid rgba(1, 36, 112, 0.82);
            text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.45);
            position: relative;
        }

        .window-titlebar .controls {
            position: absolute;
            left: var(--spacing-2);
            display: flex;
            gap: var(--spacing-2);
        }

        .window-close-btn,
        .window-titlebar .controls::before,
        .window-titlebar .controls::after {
            content: '';
            width: 13px;
            height: 13px;
            border-radius: 50%;
            box-shadow:
                inset 0 1px 1px rgba(255,255,255,0.85),
                0 1px 2px rgba(0,0,0,0.42);
        }

        .window-close-btn {
            display: block;
            border: var(--border-width-hairline) solid rgba(102, 31, 27, 0.95);
            background:
                radial-gradient(circle at 35% 28%, #ffffff 0 12%, #ffad9f 20%, #ff5a43 48%, #bb1e12 100%);
            order: 0;
        }

        .window-titlebar .controls::before {
            border: var(--border-width-hairline) solid rgba(123, 82, 6, 0.88);
            background:
                radial-gradient(circle at 35% 28%, #ffffff 0 12%, #ffe8a1 20%, #ffc446 48%, #d18505 100%);
            order: 1;
        }

        .window-titlebar .controls::after {
            border: var(--border-width-hairline) solid rgba(29, 92, 27, 0.88);
            background:
                radial-gradient(circle at 35% 28%, #ffffff 0 12%, #bff5aa 20%, #59d748 48%, #159616 100%);
            order: 2;
        }

        .window-titlebar span {
            background: transparent;
            border: 0;
            line-height: 24px;
            padding: 0 var(--spacing-3);
        }

        .window-content {
            padding: var(--spacing-6);
            background-color: var(--color-white);
            background-image:
                repeating-linear-gradient(
                    0deg,
                    rgba(255,255,255,0.92),
                    rgba(255,255,255,0.92) 1px,
                    rgba(232, 236, 242, 0.72) 1px,
                    rgba(232, 236, 242, 0.72) 3px
                );
            border-top: var(--border-width-hairline) solid rgba(0, 0, 0, 0.22);
        }

        article {
            max-width: 720px;
            margin: 0 auto;
        }

        h1 {
            font-size: var(--font-size-2xl);
            line-height: 1.2;
            border-bottom: var(--border-width-thin) solid rgba(41, 91, 157, 0.72);
            padding-bottom: var(--spacing-3);
            margin-bottom: var(--spacing-3);
            color: #10284f;
            text-shadow: 0 1px 0 var(--color-white);
        }

        h2 {
            font-size: var(--font-size-xl);
            margin: var(--spacing-6) 0 var(--spacing-2);
        }

        h3 {
            font-size: var(--font-size-lg);
            margin: var(--spacing-4) 0 var(--spacing-2);
        }

        p {
            margin-bottom: var(--spacing-3);
            line-height: var(--line-height-relaxed);
        }

        ul,
        ol {
            margin: 0 0 var(--spacing-3) var(--spacing-6);
            line-height: var(--line-height-relaxed);
        }

        li {
            margin-bottom: var(--spacing-2);
        }

        a {
            color: var(--color-link);
            text-decoration: underline;
        }

        a:hover {
            background: var(--color-aqua-blue-dark);
            color: var(--color-white);
        }

        .meta,
        .back-link {
            font-family: var(--font-family-mono);
            font-size: var(--font-size-xs);
            color: var(--color-gray-75);
        }

        .back-link {
            display: inline-block;
            margin-bottom: var(--spacing-4);
            color: var(--color-link);
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-1);
            margin: var(--spacing-3) 0 var(--spacing-5);
        }

        .article-actions {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-2);
            margin: var(--spacing-3) 0 var(--spacing-5);
        }

        .x-action {
            display: inline-block;
            border: var(--border-width-hairline) solid rgba(0, 66, 155, 0.88);
            background:
                linear-gradient(180deg, #ffffff 0%, #cdeaff 18%, #61afff 48%, #0a63d7 52%, #5eb0ff 100%);
            color: var(--color-white);
            padding: var(--spacing-1) var(--spacing-3);
            border-radius: 14px;
            font-family: var(--font-family-system);
            font-size: var(--font-size-xs);
            text-decoration: none;
            text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.34);
            box-shadow:
                inset 0 1px 1px rgba(255,255,255,0.88),
                0 1px 3px rgba(0,0,0,0.24);
        }

        .x-action:hover {
            filter: brightness(1.08);
            color: var(--color-white);
            background:
                linear-gradient(180deg, #ffffff 0%, #cdeaff 18%, #61afff 48%, #0a63d7 52%, #5eb0ff 100%);
        }

        .tag {
            border: var(--border-width-hairline) solid rgba(36, 78, 142, 0.72);
            padding: 0 var(--spacing-1);
            font-family: var(--font-family-mono);
            font-size: var(--font-size-xs);
            background: #e7f1ff;
            border-radius: 7px;
        }

        code {
            font-family: var(--font-family-mono);
            font-size: var(--font-size-sm);
            background: rgba(255, 255, 255, 0.78);
            padding: 0 var(--spacing-1);
            border-radius: 3px;
        }

        pre {
            border: var(--border-width-hairline) solid rgba(65, 91, 130, 0.46);
            background: rgba(255, 255, 255, 0.78);
            border-radius: 8px;
            padding: var(--spacing-3);
            margin: var(--spacing-3) 0 var(--spacing-4);
            line-height: 1.6;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        pre code {
            background: transparent;
            padding: 0;
        }

        blockquote {
            border-left: var(--border-width-thin) solid rgba(41, 91, 157, 0.72);
            padding-left: var(--spacing-3);
            margin: var(--spacing-4) 0;
            color: var(--color-black);
        }

        @media (max-width: 767px) {
            .menu-bar .menu-items {
                display: none;
            }

            main {
                width: calc(100vw - 16px);
                margin: var(--spacing-4) auto;
            }

            .window-content {
                padding: var(--spacing-4);
            }

            h1 {
                font-size: var(--font-size-xl);
            }
        }
    </style>
</head>
<body>
    <div class="menu-bar">
        <div class="logo">Abelliuxl</div>
        <div class="menu-items">
            <div class="menu-item">File</div>
            <div class="menu-item">Edit</div>
            <div class="menu-item">View</div>
            <div class="menu-item">Special</div>
            <div class="menu-item">Blog</div>
        </div>
        <div class="clock" id="clock">00:00:00</div>
    </div>

    <main>
        <div class="window">
            <div class="window-titlebar">
                <div class="controls"><a class="window-close-btn" href="/" aria-label="Close article and return to desktop"></a></div>
                <span>Blog Article</span>
            </div>
            <div class="window-content">
                <article>
                    <h1>{{displayTitle}}</h1>
                    <p class="meta">{{date}} · {{tagLine}}</p>
                    <div class="tags">
                        {{tags}}
                    </div>
                    <div class="article-actions">
                        <a class="x-action" id="article-x-share" href="https://twitter.com/intent/tweet" target="_blank" rel="noopener noreferrer">Share to X</a>
                    </div>
                    {{body}}
                </article>
            </div>
        </div>
    </main>

    <script>
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
        }

        updateClock();
        setInterval(updateClock, 1000);

        function initArticleShare() {
            const link = document.getElementById('article-x-share');
            if (!link) return;
            const intent = new URL('https://twitter.com/intent/tweet');
            intent.searchParams.set('text', document.title.replace(' - Abelliuxl Macintosh', ''));
            intent.searchParams.set('url', window.location.href);
            link.href = intent.href;
        }

        initArticleShare();
    </script>
</body>
</html>
